<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartHub</title>

  <!-- 🌐 FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- 🎨 CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🏠 HOME -->
  <section id="home" class="home">
    <h1 class="logo">🚀 SmartHub</h1>
    <button class="toggle-btn" onclick="toggleMode()">🌙 Toggle Mode</button>
    <p class="tagline">Your Daily Dashboard</p>


    <div class="menu">
      <button onclick="showSection('quoteSection')">💡  GET QUOTES</button>
      <button onclick="showSection('weatherSection')">🌦 WEATHER</button>
      <button onclick="showSection('newsSection')">📰 NEWS</button>
    </div>
  </section>

  <!-- 💡 QUOTE PAGE -->
  <section id="quoteSection" class="page">
    <button class="back" onclick="goHome()">⬅ Back</button>

    <h2>💡 Quotes</h2>
    <p id="quote">Loading...</p>
    <p id="author">--</p>
    <button onclick="getQuote()">New Quote</button>
  </section>

  <!-- 🌦 WEATHER PAGE -->
  <section id="weatherSection" class="page">
    <button class="back" onclick="goHome()">⬅ Back</button>

    <h2>🌦 Weather</h2>
    <input type="text" id="city" placeholder="Enter city">
    <br>
    <button onclick="getWeather()">Get Weather</button>
    <p id="weather">Enter city to check weather</p>
  </section>

  <!-- 📰 NEWS PAGE -->
  <section id="newsSection" class="page">
    <button class="back" onclick="goHome()">⬅ Back</button>

    <h2>📰 News</h2>

    <!-- 🔍 SEARCH -->
    <input type="text" id="searchNews" placeholder="Search news...">

    <button onclick="getNews()">Load News</button>

    <div id="news"></div>
  </section>

  <!-- ⚡ JS -->
  <script src="script.js"></script>

</body>
</html>
